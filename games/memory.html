<!DOCTYPE html>
<html>
<head>
<title>Memory Match</title>
<style>
body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}
.grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:10px;
justify-content:center;
}
.card{
width:80px;
height:80px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Memory Match</h1>

<div class="grid" id="grid"></div>

<script>
const emojis=["🍕","🍕","🚀","🚀","🎮","🎮","🐍","🐍",
"💎","💎","⭐","⭐","🎲","🎲","🏆","🏆"];

emojis.sort(()=>Math.random()-0.5);

let first=null;
let second=null;

const grid=document.getElementById("grid");

emojis.forEach(emoji=>{

const card=document.createElement("div");
card.className="card";
card.textContent="?";

card.onclick=()=>{

if(card.textContent!=="?") return;

card.textContent=emoji;

if(!first){
first=card;
}else{
second=card;

if(first.textContent===second.textContent){
first=null;
second=null;
}else{
setTimeout(()=>{
first.textContent="?";
second.textContent="?";
first=null;
second=null;
},800);
}
}
};

grid.appendChild(card);
});
</script>

</body>
</html>
