<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{text-align:center;font-family:Arial;background:#0f172a;color:white}
.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
}
.cell{
width:100px;
height:100px;
background:#1e293b;
font-size:50px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<h2 id="status">X's Turn</h2>

<div class="board" id="board"></div>

<script>
const board=document.getElementById("board");
const status=document.getElementById("status");

let current="X";
let cells=Array(9).fill("");

const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function check(){
for(let w of wins){
const[a,b,c]=w;
if(cells[a]&&cells[a]===cells[b]&&cells[b]===cells[c]){
status.textContent=cells[a]+" Wins!";
return true;
}
}
return false;
}

function draw(){
board.innerHTML="";

cells.forEach((cell,i)=>{
const div=document.createElement("div");
div.className="cell";
div.textContent=cell;

div.onclick=()=>{
if(cells[i]||check()) return;

cells[i]=current;

if(!check()){
current=current==="X"?"O":"X";
status.textContent=current+"'s Turn";
}

draw();
};

board.appendChild(div);
});
}

draw();
</script>

</body>
</html>
