<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird</title>
<style>
body{
margin:0;
background:#70c5ce;
overflow:hidden;
font-family:Arial;
text-align:center;
}

canvas{
display:block;
margin:auto;
background:#70c5ce;
}

#score{
position:absolute;
top:10px;
left:10px;
font-size:24px;
color:white;
font-weight:bold;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
x:80,
y:300,
velocity:0
};

let gravity = 0.5;
let jump = -8;

let pipes = [];
let score = 0;
let gameOver = false;

document.addEventListener("keydown", e=>{
if(e.code==="Space"){
bird.velocity = jump;
if(gameOver) location.reload();
}
});

function createPipe(){
let gap = 140;
let top = Math.random()*250 + 50;

pipes.push({
x:400,
top:top,
bottom:top+gap,
passed:false
});
}

setInterval(()=>{
if(!gameOver) createPipe();
},1500);

function update(){

if(gameOver) return;

bird.velocity += gravity;
bird.y += bird.velocity;

ctx.clearRect(0,0,400,600);

// bird
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,15,0,Math.PI*2);
ctx.fill();

// pipes
ctx.fillStyle="green";

pipes.forEach(pipe=>{
pipe.x -= 2;

// top pipe
ctx.fillRect(pipe.x,0,50,pipe.top);

// bottom pipe
ctx.fillRect(pipe.x,pipe.bottom,50,600);

if(
bird.x+15 > pipe.x &&
bird.x-15 < pipe.x+50 &&
(bird.y-15 < pipe.top || bird.y+15 > pipe.bottom)
){
gameOver = true;
}

// score
if(!pipe.passed && pipe.x+50 < bird.x){
score++;
pipe.passed = true;
document.getElementById("score").textContent="Score: "+score;
}
});

// remove old pipes
pipes = pipes.filter(p=>p.x>-60);

// ground / ceiling
if(bird.y>600 || bird.y<0){
gameOver = true;
}

// game over text
if(gameOver){
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText("GAME OVER",110,300);
ctx.font="18px Arial";
ctx.fillText("Press SPACE to restart",90,340);
}

requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
