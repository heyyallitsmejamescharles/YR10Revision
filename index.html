<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#111827;
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

.hero{
    text-align:center;
    padding:100px 20px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.hero h1{
    font-size:4rem;
    margin-bottom:15px;
}

.hero p{
    font-size:1.2rem;
    opacity:.9;
}

.search{
    margin-top:30px;
}

.search input{
    width:300px;
    max-width:90%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.games{
    padding:60px 8%;
}

.games h2{
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(56,189,248,.4);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:8px;
}

.play-btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    background:#111827;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <div class="logo">🎮 Game Hub</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Popular</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Play Games Instantly</h1>
    <p>Fast, free, browser-based games.</p>

    <div class="search">
        <input type="text" placeholder="Search games...">
    </div>
</section>

<section class="games">
    <h2>Popular Games</h2>

    <div class="grid">

        <div class="card">
            <img src="https://picsum.photos/400/250?1">
            <div class="card-content">
                <h3>Snake</h3>
                <p>Classic arcade fun.</p>
                <a class="play-btn" href="games/snake.html">Play</a>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/250?2">
            <div class="card-content">
                <h3>Tetris</h3>
                <p>Stack blocks and clear lines.</p>
                <a class="play-btn" href="games/tetris.html">Play</a>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/250?3">
            <div class="card-content">
                <h3>Pong</h3>
                <p>The original classic.</p>
                <a class="play-btn" href="games/pong.html">Play</a>
            </div>
        </div>

    </div>
</section>

<footer>
    © 2026 Game Hub
</footer>

</body>
</html>
